roots:
  - name: GCYCLES
    description: GPU cycles (estimated using PC sampling)
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GCYCLES-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GCYCLES-sum-x5b_0x0x5d_-lex_aware
            standard: *GCYCLES-sum-x5b_0x0x5d_-function
  - name: GINS
    description: GPU instruction execution count
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINS-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINS-sum-x5b_0x0x5d_-lex_aware
            standard: *GINS-sum-x5b_0x0x5d_-function
  - name: GINS:LAT
    description: GPU instruction latency
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_LAT-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_LAT-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_LAT-sum-x5b_0x0x5d_-function
  - name: GINS:LAT_COV
    description: GPU instruction covered latency
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-function
  - name: GINS:LAT_UCV
    description: GPU instruction uncovered latency
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-function
  - name: GINS:LAT_THR
    description: GPU threads needed to cover latency (1 + UCV/COV)
    format: "%6.0f"
    variants:
      "":
        render: [number, percent]
        formula:
          inclusive:
            standard: {+: [{/: [*GINSx3a_LAT_COV-sum-x5b_0x0x5d_-execution, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-execution]}, {/: [*GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-execution, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-execution]}]}
          exclusive:
            custom: {+: [{/: [*GINSx3a_LAT_COV-sum-x5b_0x0x5d_-lex_aware, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-lex_aware]}, {/: [*GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-lex_aware, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-lex_aware]}]}
            standard: {+: [{/: [*GINSx3a_LAT_COV-sum-x5b_0x0x5d_-function, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-function]}, {/: [*GINSx3a_LAT_UCV-sum-x5b_0x0x5d_-function, *GINSx3a_LAT_COV-sum-x5b_0x0x5d_-function]}]}
  - name: GINS:SIMD_TOT
    description: GPU instruction total SIMD lanes
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_SIMD_TOT-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_SIMD_TOT-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_SIMD_TOT-sum-x5b_0x0x5d_-function
  - name: GINS:SIMD_ACT
    description: GPU instruction active SIMD lanes
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_SIMD_ACT-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_SIMD_ACT-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_SIMD_ACT-sum-x5b_0x0x5d_-function
  - name: GINS:SIMD_WST
    description: GPU instruction wasted SIMD lanes
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_SIMD_WST-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_SIMD_WST-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_SIMD_WST-sum-x5b_0x0x5d_-function
  - name: GINS:SIMD_SLS
    description: GPU instruction SIMD lanes lost due to scalar instructions
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GINSx3a_SIMD_SLS-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GINSx3a_SIMD_SLS-sum-x5b_0x0x5d_-lex_aware
            standard: *GINSx3a_SIMD_SLS-sum-x5b_0x0x5d_-function
  - name: GCYCLES:ISU
    description: "GPU issue cycles: issued any instruction"
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GCYCLESx3a_ISU-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GCYCLESx3a_ISU-sum-x5b_0x0x5d_-lex_aware
            standard: *GCYCLESx3a_ISU-sum-x5b_0x0x5d_-function
  - name: GCYCLES:ISU:MATR
    description: "GPU issue cycles: issued matrix instruction"
    visible by default: false
    variants:
      Sum:
        render: [number, percent]
        formula:
          inclusive:
            standard: *GCYCLESx3a_ISUx3a_MATR-sum-x5b_0x0x5d_-execution
          exclusive:
            custom: *GCYCLESx3a_ISUx3a_MATR-sum-x5b_0x0x5d_-lex_aware
            standard: *GCYCLESx3a_ISUx3a_MATR-sum-x5b_0x0x5d_-function
  - name: GCYCLES:ISU:VEC2
